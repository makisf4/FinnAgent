# cargo-deny configuration for FinnAgent.
# Gates dependency licenses, security advisories, and duplicate/banned crates.

[advisories]
version = 2
yanked = "deny"
# Transitive unmaintained crates are reported by cargo-audit. Fail this gate
# only when Finn directly depends on an unmaintained crate.
unmaintained = "workspace"

[licenses]
version = 2
# Allow the permissive licenses that FinnAgent and its dependency tree use.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "bzip2-1.0.6",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
]
confidence-threshold = 0.8
exceptions = [
    # webpki-roots applies this permissive data license to its certificate set.
    { crate = "webpki-roots", allow = ["CDLA-Permissive-2.0"] },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

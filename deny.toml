# cargo-deny configuration for FinnAgent.
# Gates dependency licenses, security advisories, and duplicate/banned crates.

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Allow the permissive licenses that FinnAgent and its dependency tree use.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
